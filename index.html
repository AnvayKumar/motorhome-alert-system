<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Motorhome Radar</title>

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="topbar">
        <div class="brand">🚐 Motorhome Radar</div>

        <input id="search" placeholder="Search listings..." />

        <div class="tabs">
            <button data-filter="all" class="active">All</button>
            <button data-filter="Dealer">Dealers</button>
            <button data-filter="Private Seller">Private</button>
            <button data-filter="new">New</button>
        </div>

        <div class="sort">
            <button data-sort="asc">Price ↑</button>
            <button data-sort="desc">Price ↓</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div id="grid" class="grid"></div>

    <script src="app.js"></script>
</body>
</html>
